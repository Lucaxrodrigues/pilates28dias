// CHAT RENDER
// ═══════════════════════════════════════════════════════
let chatIdx = 0;
const chatBox = document.getElementById('chat-messages');

function appendMsg(m) {
  const el = document.createElement('div');
  el.className = 'chat-msg';
  const mbrBadge = m.mbr ? '<span style="background:#4caf50;color:#fff;font-size:9px;padding:1px 5px;border-radius:10px;margin-right:4px;">Membro</span>' : '';
  el.innerHTML = `
    <div class="msg-avatar ${m.av}">${m.name[0]}</div>
    <div class="msg-body">
      <div>${mbrBadge}<span class="msg-author${m.mod ? ' mod' : ''}">${m.name}</span></div>
      <div class="msg-text">${m.text}</div>
    </div>`;
  chatBox.appendChild(el);
  chatBox.scrollTop = chatBox.scrollHeight;
  // limitar DOM
  while (chatBox.children.length > 60) {
    chatBox.removeChild(chatBox.firstChild);
  }
}

// seed inicial
(function seed() {
  chatMessages.slice(0, 10).forEach(m => appendMsg(m));
  chatIdx = 10;
})();

// rolling
function nextMsg() {
  appendMsg(chatMessages[chatIdx % chatMessages.length]);
  chatIdx++;
  setTimeout(nextMsg, 1600 + Math.random() * 3000);
}
setTimeout(nextMsg, 1800);

// ═══════════════════════════════════════════════════════
// VIEWER COUNT
// ═══════════════════════════════════════════════════════
let viewers = 947;
function tickViewers() {
  viewers = Math.max(880, Math.min(1120, viewers + Math.floor(Math.random() * 13) - 5));
  document.getElementById('vc-num').textContent = viewers.toLocaleString('pt-BR');
  setTimeout(tickViewers, 4000 + Math.random() * 3000);
}
setTimeout(tickViewers, 3000);
