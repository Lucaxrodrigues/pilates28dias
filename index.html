}

// seed
MSGS.slice(0, 10).forEach(m => addMsg(m));
idx = 10;

// rolling messages
(function roll() {
  addMsg(MSGS[idx % MSGS.length]);
  idx++;
  setTimeout(roll, 1500 + Math.random() * 3000);
})();

// viewer count fluctuation
let vc = 947;
const vcEl = document.getElementById('vc-num');
(function tickVc() {
  vc = Math.max(880, Math.min(1150, vc + Math.floor(Math.random() * 13) - 5));
  vcEl.textContent = vc.toLocaleString('pt-BR');
  setTimeout(tickVc, 4000 + Math.random() * 3000);
})();
</script>
</body>
</html>
